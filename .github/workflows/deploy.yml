name: CI/CD - Deploiement
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Test du projet
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Verifier index.html
        run: test -f index.html

      - name: Verifier style.css
        run: test -f style.css

      - name: Verifier le titre du projet
        run: grep -q "Déploiement Automatique" index.html

      - name: Message de succes
        run: echo "Les tests sont passes avec succes."

  deploy:
    name: Deploiement sur GitHub Pages
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparer les fichiers
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deployer le site
        id: deployment
        uses: actions/deploy-pages@v4
